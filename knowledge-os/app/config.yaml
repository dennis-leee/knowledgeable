model:
  agents:
    ingestion: "direct"
    summarizer: "openrouter/free"
    entity: "openrouter/free"
    relation: "openrouter/free"
    insight: "openrouter/free"
    skills: "openrouter/free"
  embedding: "text-embedding-3-small"

pipeline:
  max_tokens: 16000
  retry_limit: 2
  fallback_parsers:
    - "jina-reader"
    - "playwright"
    - "readability-lxml"

confidence:
  threshold: 0.6

storage:
  markdown_path: "./data/md"
  graph_path: "./data/graph"
  skills_path: "./data/skills"
  vector_store: "chroma"
  vector_persist: "./data/vectors"
